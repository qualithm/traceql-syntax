# Generated by dx/scripts/branch-sync from ci-templates/sync-branches.yaml.
# Do not edit directly — change the template and re-run branch-sync.

name: Sync Branches

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [test, main]
  workflow_dispatch: {}

concurrency:
  group: sync-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  guard:
    name: Source Branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Enforce promotion path
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"
          case "$base" in
            test) allowed="development" ;;
            main) allowed="test" ;;
            *) echo "::error::unhandled base branch $base"; exit 1 ;;
          esac
          if [[ "$head" != "$allowed" ]]; then
            echo "::error::PRs into $base must come from $allowed, not $head"
            exit 1
          fi
  sync:
    name: Sync downstream branches
    runs-on: ubuntu-24.04
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CI_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Keep test branch ancestry aligned with main to avoid cumulative merge commits.
      - name: Reset test to main
        if: github.ref_name == 'main'
        run: |
          git checkout test
          git reset --hard origin/main
          git push --force-with-lease origin test

      - name: Realign development onto main
        if: github.ref_name == 'main'
        run: |
          git checkout development
          # A squash merge collapses a PR's N commits into one, so the promoted
          # commits are NOT patch-equivalent to any single development commit and a
          # plain rebase cannot drop them — it conflicts, aborts, and leaves
          # development to accumulate. When the squash has drained development (its
          # tree now matches main) adopt main's clean linear history outright; only
          # genuinely-unpromoted work (differing trees) is preserved via rebase, and
          # because the drained case keeps development linear that rebase no longer
          # trips over stale merge commits.
          if git diff --quiet origin/main development; then
            if [ "$(git rev-parse development)" = "$(git rev-parse origin/main)" ]; then
              echo "development already aligned with main — nothing to push"
            else
              git reset --hard origin/main
              git push --force-with-lease origin development
              echo "development reset onto main (identical trees)"
            fi
          else
            before=$(git rev-parse development)
            if git rebase origin/main; then
              if [ "$before" = "$(git rev-parse development)" ]; then
                echo "development already aligned with main — nothing to push"
              else
                git push --force-with-lease origin development
                echo "development realigned onto main"
              fi
            else
              git rebase --abort
              echo "development conflicts with main — left untouched for manual resolution"
            fi
          fi

      # When test advances, realign development onto it so its base does not rot.
      - name: Realign development onto test
        if: github.ref_name == 'test'
        run: |
          git checkout development
          # A squash merge collapses a PR's N commits into one, so the promoted
          # commits are NOT patch-equivalent to any single development commit and a
          # plain rebase cannot drop them — it conflicts, aborts, and leaves
          # development to accumulate. When the squash has drained development (its
          # tree now matches test) adopt test's clean linear history outright; only
          # genuinely-unpromoted work (differing trees) is preserved via rebase, and
          # because the drained case keeps development linear that rebase no longer
          # trips over stale merge commits.
          if git diff --quiet origin/test development; then
            if [ "$(git rev-parse development)" = "$(git rev-parse origin/test)" ]; then
              echo "development already aligned with test — nothing to push"
            else
              git reset --hard origin/test
              git push --force-with-lease origin development
              echo "development reset onto test (identical trees)"
            fi
          else
            before=$(git rev-parse development)
            if git rebase origin/test; then
              if [ "$before" = "$(git rev-parse development)" ]; then
                echo "development already aligned with test — nothing to push"
              else
                git push --force-with-lease origin development
                echo "development realigned onto test"
              fi
            else
              git rebase --abort
              echo "development conflicts with test — left untouched for manual resolution"
            fi
          fi
