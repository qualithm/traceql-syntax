# Generated by dx/scripts/audit-sync from ci-templates/audit-go-vendored.yaml.
# Do not edit directly — change the template and re-run audit-sync.

name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

env:
  GOVULNCHECK_VERSION: v1.3.0

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
      - name: Run govulncheck
        id: scan
        continue-on-error: true
        run: govulncheck ./...
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: govulncheck found a vulnerability"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: govulncheck found a vulnerability"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1

  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Run gosec
        id: scan
        continue-on-error: true
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        env:
          GOTOOLCHAIN: auto
        with:
          args: -exclude-dir=traceql -exclude-dir=tempopb -exclude-dir=internal ./...
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: gosec flagged a finding"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: gosec flagged a finding"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1

  sync-check:
    name: Upstream Sync Drift
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Resolve pinned Loki version
        id: pin
        run: |
          ver=$(awk -F'"' '/^LOKI_VERSION="\$\{1:-/ {print $2}' scripts/sync-upstream.sh | sed 's/.*-//;s/}//')
          echo "Pinned Loki version: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Prime module cache
        run: go mod download github.com/grafana/loki/v3@${{ steps.pin.outputs.version }}
      - name: Re-run sync script
        run: bash scripts/sync-upstream.sh ${{ steps.pin.outputs.version }}
      - name: Fail on drift
        id: scan
        continue-on-error: true
        run: |
          if ! git diff --exit-code; then
            echo "::error::Vendored upstream files are out of sync with Loki ${{ steps.pin.outputs.version }}."
            echo "Run 'scripts/sync-upstream.sh' locally and commit the result."
            exit 1
          fi
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: vendored Loki sources drifted from upstream"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: vendored Loki sources drifted from upstream"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1
