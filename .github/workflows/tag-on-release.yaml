# Generated by dx/scripts/tag-sync from ci-templates/tag-on-release.yaml.
# Do not edit directly — change the template and re-run tag-sync.

name: Tag on Release

# Producer half of the tag-driven release flow. The release.yaml in each repo
# is the CONSUMER (triggered by `push: tags`); this workflow is the PRODUCER:
# it creates the tag on a commit that has landed on main.
#
# Trigger is `push: [main]`: the tag is cut once a commit lands on main. Every
# such commit already passed CI on its PR (CI runs on `pull_request` into
# main/test), so gating on a main CI run is unnecessary — and impossible, since
# CI has no `push: [main]` trigger. The version source of truth is the repo's
# manifest (package.json / Cargo.toml / tauri.conf.json / VERSION); a push that
# does not change the version is a no-op because the tag already exists, so this
# is safe to run on every push to main.
#
# The tag MUST be pushed with the qualithm-ci App token, not GITHUB_TOKEN —
# tags pushed with GITHUB_TOKEN do not trigger downstream workflows, so
# release.yaml would never fire.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: tag-on-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    name: Tag main when version changes
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CI_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_GH_APP_PRIVATE_KEY }}

      - name: Checkout main commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # github.sha is the pushed main commit (or the branch tip on manual
          # dispatch). fetch-depth 0 + tags so we can detect an already-released
          # version.
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve intended tag from version source
        id: version
        run: |
          set -euo pipefail

          # Detect ecosystem by manifest. Order matters: Tauri carries BOTH a
          # package.json and a Cargo.toml, so it must be matched first.
          #
          # Tag prefix policy: Go MUST be v-prefixed (Go module semantics) and
          # Tauri stays v-prefixed (its release.yaml triggers on v*.*.*). JS and
          # Rust are BARE (X.Y.Z, no leading v).
          if [[ -f src-tauri/tauri.conf.json ]]; then
            kind="tauri"
            version=$(jq -r '.version' src-tauri/tauri.conf.json)
            prefix="v"
          elif [[ -f Cargo.toml ]]; then
            kind="rust"
            version=$(grep -E '^version[[:space:]]*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
            prefix=""
          elif [[ -f package.json ]]; then
            kind="js"
            version=$(jq -r '.version' package.json)
            prefix=""
          elif [[ -f VERSION ]]; then
            kind="go"
            version=$(tr -d '[:space:]' < VERSION)
            prefix="v"
          else
            echo "::error::no version source found (package.json / Cargo.toml / tauri.conf.json / VERSION)"
            exit 1
          fi

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::could not read a version from the ${kind} manifest"
            exit 1
          fi

          # 0.0.0 is the unreleased sentinel for freshly scaffolded template
          # repos — never cut a release for it.
          if [[ "$version" == "0.0.0" ]]; then
            echo "::notice::version is the 0.0.0 unreleased sentinel — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${prefix}${version}"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "::notice::detected ${kind} version ${version} -> tag ${tag}"

      - name: Create and push tag if missing
        if: steps.version.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::tag ${TAG} already exists — nothing to release"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Annotated tag on the current (main) commit. Pushing with the App
          # token fires release.yaml via its `push: tags` trigger.
          git tag -a "${TAG}" -m "release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "::notice::pushed tag ${TAG} on $(git rev-parse HEAD)"
