# Generated by dx/scripts/ci-sync from ci-templates/go-vendored.yaml.
# Do not edit directly — change the template and re-run ci-sync.

name: CI

on:
  pull_request:
    branches: [main, test]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.26.4"
  # Upstream tests to skip (repo-specific; empty for repos with none).
  SKIP_TESTS: ""

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.f.outputs.code }}
      is-main: ${{ steps.tier.outputs.is-main }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!LICENSE'
              - '!NOTICE'
      - id: tier
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "is-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-main=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Format check
        # Only enforce gofmt on files we own; vendored upstream keeps its style.
        run: |
          out=$(gofmt -s -l ./*.go tempopb/pool.go internal/util/log/log.go)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: Tidy check
        run: |
          go mod tidy
          tidy_paths=go.mod
          [ -f go.sum ] && tidy_paths="go.mod go.sum"
          if ! git diff --exit-code $tidy_paths; then
            echo "go.mod / go.sum are not tidy. Run 'go mod tidy'."
            exit 1
          fi
      - run: go vet ./...
      - run: go build ./...

  test:
    name: Test (Go ${{ matrix.go-version }})
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.4"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Test
        run: |
          if [ -n "$SKIP_TESTS" ]; then
            go test -race -count=1 -skip "$SKIP_TESTS" ./...
          else
            go test -race -count=1 ./...
          fi

  coverage:
    name: Coverage
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage
        run: |
          if [ -n "$SKIP_TESTS" ]; then
            go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -skip "$SKIP_TESTS" ./...
          else
            go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
          fi
      - name: Enforce first-party coverage threshold
        run: |
          head -n1 coverage.out > coverage.firstparty.out
          if [ "NONE" = "NONE" ]; then
            echo "no first-party code in this repo; skipping first-party coverage gate"
            exit 0
          fi
          grep -E 'NONE' coverage.out \
            | grep -v '\.y\.go:' >> coverage.firstparty.out || true
          pct=$(go tool cover -func=coverage.firstparty.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "First-party coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 80.0) { print "first-party coverage below 80%"; exit 1 } }'
      - name: Split coverage into upstream profile
        run: |
          head -n1 coverage.out > coverage.upstream.out
          grep -E '^github.com/qualithm/traceql-syntax/(traceql|tempopb|internal)/' coverage.out \
            | grep -v '\.y\.go:' >> coverage.upstream.out || true
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.firstparty.out
          flags: firstparty
          fail_ci_if_error: false
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.upstream.out
          flags: upstream
          fail_ci_if_error: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  ci-required:
    name: CI Required
    if: always()
    needs: [changes, build, test, coverage]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify dependent jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
          echo "$NEEDS" | jq -e '[.[] | .result] | all(. == "success" or . == "skipped")' \
            || { echo "::error::One or more required jobs failed or were cancelled"; exit 1; }
